<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Website Twibbon FORTASI 2025 SMP MBS Al Badar Prambanan">

    <title>
        Twibbon FORTASI 2026 | SMP MBS Al Badar
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <main class="container">

        <!-- =========================
             HEADER
        ========================== -->

        <header class="header">

            <h1>
                TWIBBON FORTASI 2025
            </h1>

            <p>
                SMP MBS Al Badar Prambanan
            </p>

        </header>

        <!-- =========================
             PREVIEW
        ========================== -->

        <section class="preview-section">

            <div
                id="preview"
                class="preview">

                <!-- Foto Peserta -->

                <img
                    id="photo"
                    src=""
                    alt="Foto Peserta"
                    draggable="false">

                <!-- Frame Twibbon -->

                <img
                    id="frame"
                    src="frame.png"
                    alt="Frame Twibbon"
                    draggable="false">

            </div>

        </section>

        <!-- =========================
             CONTROL
        ========================== -->

        <section class="controls">

            <!-- Upload -->

            <label
                class="upload-button"
                for="upload">

                📷 Pilih Foto

            </label>

            <input
                type="file"
                id="upload"
                accept="image/png,image/jpeg,image/jpg,image/webp"
                hidden>

            <!-- Zoom -->

            <div class="zoom-box">

                <label for="zoom">

                    Zoom Foto

                </label>

                <input
                    type="range"
                    id="zoom"
                    min="1"
                    max="3"
                    value="1"
                    step="0.01">

            </div>

            <!-- Tombol -->

            <div class="button-group">

                <button
                    id="reset"
                    type="button">

                    Reset

                </button>

                <button
                    id="download"
                    type="button">

                    Download Twibbon

                </button>

            </div>

        </section>

        <!-- =========================
             PETUNJUK
        ========================== -->

        <section class="guide">

            <h2>
                Cara Menggunakan
            </h2>

            <ol>

                <li>
                    Klik tombol <strong>Pilih Foto</strong>.
                </li>

                <li>
                    Geser posisi foto agar sesuai dengan frame.
                </li>

                <li>
                    Atur ukuran foto menggunakan slider.
                </li>

                <li>
                    Klik <strong>Download Twibbon</strong>.
                </li>

            </ol>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
