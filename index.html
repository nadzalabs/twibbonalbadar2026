<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Twibbon FORTASI 2025 SMP MBS Al Badar Prambanan">

    <title>Twibbon FORTASI 2025 | SMP MBS Al Badar</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">

        <!-- Header -->

        <header class="header">

            <h1>TWIBBON FORTASI 2025</h1>

            <p>
                SMP MBS Al Badar Prambanan
            </p>

        </header>

        <!-- Preview -->

        <section class="preview-section">

            <div class="preview-area">

                <!-- Foto -->

                <img
                    id="photo"
                    src=""
                    alt="Preview Foto"
                    draggable="false"
                >

                <!-- Frame -->

                <img
                    id="frame"
                    src="frame.png"
                    alt="Frame Twibbon"
                    draggable="false"
                >

            </div>

        </section>

        <!-- Kontrol -->

        <section class="control-section">

            <label class="upload-button">

                Pilih Foto

                <input
                    type="file"
                    id="upload"
                    accept="image/*"
                    hidden>

            </label>

            <div class="slider">

                <label for="zoom">

                    Zoom Foto

                </label>

                <input
                    type="range"
                    id="zoom"
                    min="1"
                    max="3"
                    step="0.01"
                    value="1">

            </div>

            <div class="button-group">

                <button id="reset">

                    Reset

                </button>

                <button id="download">

                    Download Twibbon

                </button>

            </div>

        </section>

        <!-- Informasi -->

        <section class="info">

            <h2>Cara Menggunakan</h2>

            <ol>

                <li>Pilih foto dari galeri.</li>

                <li>Geser foto agar pas di dalam frame.</li>

                <li>Perbesar atau perkecil menggunakan slider.</li>

                <li>Klik <strong>Download Twibbon</strong>.</li>

            </ol>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
